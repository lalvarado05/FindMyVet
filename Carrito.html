<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <title>Carrito de Compras</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
        rel="stylesheet"
    >

    <link rel="stylesheet"
          href="dist/css/main.css">

</head>


<body>


    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top">
        <div class="container-fluid px-5">
          <a class="navbar-brand d-flex align-items-center gap-2" href="#home">
            <img src="img/petZone-logo.png" alt="PetZone Logo" class="logo-image">
            <span class="logo-text">PetZone</span>
          </a>
    
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
            aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
    
          <div class="collapse navbar-collapse justify-content-end" id="mainNav">
            <ul class="navbar-nav align-items-lg-center gap-3">
              <li class="nav-item">
                <a class="nav-link d-flex align-items-center" href="#home">
                  <i class="fa-regular fa-house me-1"></i> Inicio
                        </a>
                    </li>
              <li class="nav-item">
                <a class="nav-link d-flex align-items-center" href="#productos">
                  <i class="fa-solid fa-bag-shopping me-1"></i> Productos
                        </a>
                    </li>
              <li class="nav-item">
                <a class="nav-link d-flex align-items-center" href="#perfil">
                  <i class="fa-solid fa-user me-1"></i> Perfil
                        </a>
                    </li>
                </ul>
          </div>
            </div>
        </nav>



<div class="main-container">


    <div class="confirmation-card">


        <h5 class="mb-4">
            Carrito de compras
        </h5>


        <div id="carritoProductos"></div>


        <hr>


        <div class="d-flex justify-content-between total-line">

            <span>
                Total
            </span>

            <span id="totalCarrito"></span>

        </div>


        <div class="text-center mt-4">

            <button class="btn btn-dark px-4">
                Proceder al pago
            </button>

        </div>


    </div>


</div>



<script src="js/carrito.js"></script>
<script src="js/main.js"></script>


</body>

</html>
