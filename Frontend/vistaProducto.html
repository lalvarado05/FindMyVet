<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle - PetZone</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="dist/css/main.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top">
        <div class="container-fluid px-5">
            <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
                <img src="img/petZone-logo.png" alt="Logo" class="logo-image">
                <span class="logo-text">PetZone</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="mainNav">
                <ul class="navbar-nav align-items-lg-center gap-3">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="productos.html">Productos</a>
                    </li>
                    <li class="nav-item" id="adminLinkItem" style="display: none;">
                        <a class="nav-link" href="admin.html">Admin</a>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-outline-danger btn-sm" onclick="logout()">
                            <i class="bi bi-box-arrow-right me-1"></i> Cerrar Sesión
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container vista-producto-container">
        
     

<div class="volver" style="margin-top: 120px;">
                <a href="productos.html" class="btn btn-volver mb-4">← Volver</a>
        </div>

        <div class="detalle-card">
            <div class="row align-items-center">
                <div class="col-md-5">
                    <div class="img-container">
                        <img id="detalleImagen" src="img/placeholder.png" alt="Cargando..." class="img-fluid">
                    </div>
                </div>
                <div class="col-md-7">
                    <div class="detalle-info">
                        <span id="detalleCategoria" class="badge-categoria">Categoría</span>
                        <h1 id="detalleNombre">Nombre del producto</h1>
                        <h2 id="detallePrecio" class="detalle-precio"></h2>
                        <hr class="my-4">
                        <p class="fw-bold">Descripción:</p>
                        <p id="detalleDescripcion" class="text-muted"></p>
                        <button id="btnAgregar" class="btn-agregar-detalle w-100">
                            <i class="bi bi-cart-plus-fill"></i> Agregar al Carrito
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
    </main>

<a href="carrito.html" class="cart-button">
    <i class="bi bi-cart-fill"></i>
    <span id="cartCount">0</span>
</a>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/main.js"></script>
    <script src="js/vistaProducto.js"></script>
</body>
</html>
