<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetZone - Mi Carrito</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/4e4b815a9a.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="dist/css/main.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top">
        <div class="container-fluid px-5">
            <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
                <img src="img/petZone-logo.png" alt="PetZone Logo" class="logo-image" style="height: 40px;">
                <span class="logo-text">PetZone</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="mainNav">
                <ul class="navbar-nav align-items-lg-center gap-3">
                    <li class="nav-item d-flex align-items-center me-3" id="clima-container">
                        <img id="clima-icono" src="" alt="Clima" style="width: 35px; display: none;" class="me-1">
                        <span id="clima-texto" class="text-muted small">Cargando...</span>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link d-flex align-items-center" href="index.html">
                            <i class="fa-regular fa-house me-1"></i> Inicio
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link d-flex align-items-center" href="productos.html">
                            <i class="fa-solid fa-bag-shopping me-1"></i> Productos
                        </a>
                    </li>
                    <li class="nav-item" id="misOrdenesItem" style="display: none;">
                        <a class="nav-link d-flex align-items-center" href="mis-ordenes.html">
                            <i class="fa-solid fa-receipt me-1"></i> Mis Órdenes
                        </a>
                    </li>
                    <li class="nav-item" id="adminLinkItem" style="display: none;">
                        <a class="nav-link d-flex align-items-center" href="admin.html" id="adminLink">
                            <i class="fa-solid fa-gear me-1"></i> Admin
                        </a>
                    </li>
                    <li class="nav-item" id="loginItem">
                        <a class="nav-link d-flex align-items-center" href="login.html" id="loginLink">
                            <i class="fa-solid fa-user me-1"></i> Iniciar Sesión
                        </a>
                    </li>
                    <li class="nav-item" id="logoutItem" style="display: none;">
                        <span class="nav-link d-flex align-items-center" id="usuarioNombre"></span>
                    </li>
                    <li class="nav-item" id="logoutBtnItem" style="display: none;">
                        <button class="btn btn-outline-danger btn-sm" onclick="logout()">
                            Cerrar Sesión
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-5 py-5" style="max-width: 600px;">
        <div class="volver">
            <a href="productos.html" class="btn btn-volver mb-4">← Volver</a>
        </div>
      
        <div class="card shadow-sm p-4 border-0">
            <h5 class="mb-4 text-center fw-bold">Resumen de Compra</h5>
            
            <div id="carritoProductos"></div>

            <hr class="my-4">

            <div class="d-flex justify-content-between fw-bold fs-5 mb-4">
                <span>Total</span>
                <span id="totalCarrito" class="text-success">₡0</span>
            </div>

            <div class="text-center d-grid gap-2">
                <button class="btn btn-dark btn-lg py-3 fw-bold" onclick="procederAlPago()">
                    Proceder al pago
                </button>               
                <a href="productos.html" class="btn btn-outline-secondary">Seguir comprando</a>
                <button class="btn btn-link text-danger btn-sm mt-2" onclick="vaciarCarrito()">
                    Vaciar mi carrito
                </button>
            </div>
        </div>
    </main>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/main.js"></script>
    <script src="js/clima.js"></script>
    <script src="js/carrito.js"></script>
</body>
</html>
